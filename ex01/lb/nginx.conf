upstream app1 {
    server host.docker.internal:8000;
}

upstream app2 {
    server host.docker.internal:9000;
}

server {
    listen 80;
    server_name localhost;

    root /var/www/my_website;

#폴더 주소로만 접속했을 때 보여줄 index 페이지
    index index.html;

    location /app1 {
        proxy_pass http://app1/;  
    }

    location /app2 {
        proxy_pass http://app2/;
    }
}
